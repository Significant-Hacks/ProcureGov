<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 620" font-family="Inter,sans-serif">
<style>
  .box{rx:5;stroke-width:1.5}
  .lbl{fill:#fff;font-size:10px;font-weight:700;text-anchor:middle}
  .sub{fill:#e8f5e9;font-size:7.5px;text-anchor:middle}
  .arr{fill:none;stroke:#555;stroke-width:1.3;marker-end:url(#ah)}
  .arr2{fill:none;stroke:#1565C0;stroke-width:1.3;marker-end:url(#ah2)}
  .tag{fill:#333;font-size:8px;font-weight:600}
</style>
<defs>
  <marker id="ah" markerWidth="6" markerHeight="5" refX="5" refY="2.5" orient="auto"><path d="M0,0 L6,2.5 L0,5z" fill="#555"/></marker>
  <marker id="ah2" markerWidth="6" markerHeight="5" refX="5" refY="2.5" orient="auto"><path d="M0,0 L6,2.5 L0,5z" fill="#1565C0"/></marker>
</defs>

<!-- Browser/Client -->
<rect x="170" y="8" width="180" height="36" class="box" fill="#37474F" stroke="#263238"/>
<text x="260" y="30" class="lbl">Browser / Client</text>

<!-- AuthRedirectFilter -->
<rect x="130" y="68" width="260" height="32" class="box" fill="#BF360C" stroke="#8C2500" stroke-dasharray="4,2"/>
<text x="260" y="88" class="lbl" font-size="9">AuthRedirectFilter (Security)</text>

<!-- JSP Views -->
<rect x="20" y="130" width="160" height="60" class="box" fill="#6A1B9A" stroke="#4A148C"/>
<text x="100" y="150" class="lbl">JSP Views (View)</text>
<text x="100" y="162" class="sub">login.jsp, dashboard JSPs,</text>
<text x="100" y="172" class="sub">tender-detail, submit-bid, evaluation-panel</text>

<!-- Servlet Controllers -->
<rect x="200" y="130" width="300" height="60" class="box" fill="#1B5E20" stroke="#0d2818"/>
<text x="350" y="150" class="lbl">Servlet Controllers (Controller)</text>
<text x="350" y="162" class="sub">LoginServlet, TenderStatusServlet, SubmitBidServlet,</text>
<text x="350" y="172" class="sub">SubmitScoreServlet, EvaluationPanelServlet, AwardContractServlet</text>

<!-- Service Layer -->
<rect x="200" y="220" width="300" height="50" class="box" fill="#0D47A1" stroke="#002171"/>
<text x="350" y="240" class="lbl">Service Layer</text>
<text x="350" y="252" class="sub">EvaluationService · EmailService · NotificationService</text>

<!-- DAO Layer -->
<rect x="200" y="300" width="300" height="60" class="box" fill="#E65100" stroke="#BF360C"/>
<text x="350" y="320" class="lbl">DAO Layer (Model)</text>
<text x="350" y="332" class="sub">TenderDAOImpl, BidDAOImpl, EvaluationDAOImpl,</text>
<text x="350" y="342" class="sub">UserDAOImpl, SupplierDAOImpl, EvaluatorDAOImpl</text>

<!-- DBConnectionUtil -->
<rect x="240" y="388" width="220" height="26" class="box" fill="#546E7A" stroke="#37474F"/>
<text x="350" y="405" class="lbl" font-size="8.5">DBConnectionUtil (JNDI Pool)</text>

<!-- MySQL Database -->
<rect x="200" y="440" width="300" height="36" class="box" fill="#00695C" stroke="#004D40"/>
<text x="350" y="462" class="lbl">MySQL Database (DavidMohale2333908)</text>

<!-- ===== ARROWS ===== -->

<!-- Request: Browser → Filter → Servlet → Service → DAO → DB -->
<line x1="260" y1="44" x2="260" y2="68" class="arr"/>
<line x1="260" y1="100" x2="260" y2="130" class="arr"/>
<line x1="350" y1="190" x2="350" y2="220" class="arr"/>
<line x1="350" y1="270" x2="350" y2="300" class="arr"/>
<line x1="350" y1="360" x2="350" y2="388" class="arr"/>
<line x1="350" y1="414" x2="350" y2="440" class="arr"/>

<!-- Request label -->
<text x="275" y="57" class="tag" fill="#555">Request ▼</text>

<!-- Response: DB → DAO → Servlet → JSP → Browser -->
<polyline points="200,458 10,458 10,160 20,160" class="arr2"/>
<text x="22" y="310" class="tag" fill="#1565C0" transform="rotate(-90,22,310)">Response Flow ▲</text>

<!-- Servlet → JSP (forward) -->
<line x1="200" y1="160" x2="180" y2="160" class="arr2"/>

<!-- Labels on arrows -->
<text x="360" y="206" class="tag">delegates</text>
<text x="360" y="288" class="tag">invokes</text>
<text x="360" y="378" class="tag">getConnection()</text>
<text x="360" y="432" class="tag">SQL/JDBC</text>

<!-- Legend -->
<rect x="20" y="500" width="480" height="110" rx="4" fill="#f5f5f5" stroke="#ddd"/>
<text x="260" y="518" font-size="9" font-weight="700" fill="#333" text-anchor="middle">MVC Architecture — Request / Response Flow</text>
<line x1="40" y1="535" x2="80" y2="535" class="arr"/><text x="85" y="538" font-size="8" fill="#555">Request flow (Browser → DB)</text>
<line x1="40" y1="555" x2="80" y2="555" class="arr2"/><text x="85" y="558" font-size="8" fill="#1565C0">Response flow (DB → Browser)</text>
<rect x="40" y="572" width="12" height="10" fill="#BF360C" stroke-dasharray="3,1.5" stroke="#8C2500" rx="2"/><text x="58" y="580" font-size="8" fill="#555">AuthRedirectFilter — intercepts all requests, enforces RBAC</text>
<text x="40" y="600" font-size="7.5" fill="#666">JNDI: java:comp/env/jdbc/ProcureGovDB · Session: SessionUtil · Password: SHA-256 via PasswordUtil</text>
</svg>
