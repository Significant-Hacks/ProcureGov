<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 960" font-family="Inter,sans-serif">
<style>.t{fill:#1B4332;stroke:#0d2818;stroke-width:1.5;rx:5}.h{fill:#fff;font-size:12px;font-weight:700}.c{fill:#e8f5e9;font-size:10px}.p{fill:#C9A227;font-size:10px;font-weight:700}.f{fill:#1565C0;font-size:10px;font-style:italic}.r{fill:none;stroke:#555;stroke-width:1.4}.d{fill:none;stroke:#888;stroke-width:1.2;stroke-dasharray:5,3}.l{fill:#333;font-size:9px;font-weight:600}</style>
<!-- users -->
<rect x="400" y="10" width="230" height="168" class="t"/>
<rect x="400" y="10" width="230" height="22" fill="#0d2818" rx="5"/><text x="515" y="25" class="h" text-anchor="middle">users</text>
<text x="408" y="49" class="p">PK id INT AUTO_INC</text>
<text x="408" y="62" class="c">email VARCHAR(255) UNIQUE</text>
<text x="408" y="75" class="c">password_hash VARCHAR(64)</text>
<text x="408" y="88" class="c">role ENUM(...)</text>
<text x="408" y="101" class="c">is_active BOOLEAN</text>
<text x="408" y="114" class="c">failed_login_attempts INT</text>
<text x="408" y="127" class="c">account_locked BOOLEAN</text>
<text x="408" y="140" class="c">created_at, updated_at</text>
<!-- user_tokens -->
<rect x="20" y="240" width="210" height="112" class="t"/>
<rect x="20" y="240" width="210" height="22" fill="#0d2818" rx="5"/><text x="125" y="255" class="h" text-anchor="middle">user_tokens</text>
<text x="28" y="279" class="p">PK id INT AUTO_INC</text>
<text x="28" y="292" class="f">FK user_id INT</text>
<text x="28" y="305" class="c">token VARCHAR(64) UNIQUE</text>
<text x="28" y="318" class="c">token_type ENUM(...)</text>
<text x="28" y="331" class="c">expires_at, used, created_at</text>
<!-- suppliers -->
<rect x="280" y="240" width="210" height="126" class="t"/>
<rect x="280" y="240" width="210" height="22" fill="#0d2818" rx="5"/><text x="385" y="255" class="h" text-anchor="middle">suppliers</text>
<text x="288" y="279" class="p">PK id INT AUTO_INC</text>
<text x="288" y="292" class="f">FK user_id INT UNIQUE</text>
<text x="288" y="305" class="c">company_name VARCHAR(255)</text>
<text x="288" y="318" class="c">registration_number UNIQUE</text>
<text x="288" y="331" class="c">physical_address, contact_number</text>
<text x="288" y="344" class="c">is_verified BOOLEAN</text>
<!-- officers -->
<rect x="540" y="240" width="190" height="98" class="t"/>
<rect x="540" y="240" width="190" height="22" fill="#0d2818" rx="5"/><text x="635" y="255" class="h" text-anchor="middle">officers</text>
<text x="548" y="279" class="p">PK id INT AUTO_INC</text>
<text x="548" y="292" class="f">FK user_id INT UNIQUE</text>
<text x="548" y="305" class="c">full_name, department</text>
<text x="548" y="318" class="c">staff_id UNIQUE</text>
<!-- evaluators -->
<rect x="790" y="240" width="210" height="98" class="t"/>
<rect x="790" y="240" width="210" height="22" fill="#0d2818" rx="5"/><text x="895" y="255" class="h" text-anchor="middle">evaluators</text>
<text x="798" y="279" class="p">PK id INT AUTO_INC</text>
<text x="798" y="292" class="f">FK user_id INT UNIQUE</text>
<text x="798" y="305" class="c">full_name, department</text>
<text x="798" y="318" class="c">staff_id UNIQUE</text>
<!-- tenders -->
<rect x="340" y="430" width="240" height="168" class="t"/>
<rect x="340" y="430" width="240" height="22" fill="#0d2818" rx="5"/><text x="460" y="445" class="h" text-anchor="middle">tenders</text>
<text x="348" y="469" class="p">PK id INT AUTO_INC</text>
<text x="348" y="482" class="f">FK created_by INT → users</text>
<text x="348" y="495" class="c">reference_number UNIQUE</text>
<text x="348" y="508" class="c">title, category ENUM(...)</text>
<text x="348" y="521" class="c">description TEXT</text>
<text x="348" y="534" class="c">estimated_value DECIMAL(15,2)</text>
<text x="348" y="547" class="c">submission_deadline DATETIME</text>
<text x="348" y="560" class="c">status ENUM(6 states)</text>
<text x="348" y="573" class="c">notice_doc_path, show_est_val</text>
<!-- tender_evaluators -->
<rect x="790" y="430" width="210" height="98" class="t"/>
<rect x="790" y="430" width="210" height="22" fill="#0d2818" rx="5"/><text x="895" y="445" class="h" text-anchor="middle">tender_evaluators</text>
<text x="798" y="469" class="p">PK id INT AUTO_INC</text>
<text x="798" y="482" class="f">FK tender_id INT</text>
<text x="798" y="495" class="f">FK evaluator_id INT</text>
<text x="798" y="508" class="c">assigned_at DATETIME</text>
<!-- awards -->
<rect x="20" y="680" width="220" height="126" class="t"/>
<rect x="20" y="680" width="220" height="22" fill="#0d2818" rx="5"/><text x="130" y="695" class="h" text-anchor="middle">awards</text>
<text x="28" y="719" class="p">PK id INT AUTO_INC</text>
<text x="28" y="732" class="f">FK tender_id INT UNIQUE</text>
<text x="28" y="745" class="f">FK winning_bid_id INT</text>
<text x="28" y="758" class="f">FK awarded_by INT → users</text>
<text x="28" y="771" class="c">awarded_value, justification</text>
<text x="28" y="784" class="c">awarded_at, confirm_doc_path</text>
<!-- evaluations -->
<rect x="200" y="680" width="230" height="126" class="t"/>
<rect x="200" y="680" width="230" height="22" fill="#0d2818" rx="5"/><text x="315" y="695" class="h" text-anchor="middle">evaluations</text>
<text x="208" y="719" class="p">PK id INT AUTO_INC</text>
<text x="208" y="732" class="f">FK bid_id INT</text>
<text x="208" y="745" class="f">FK tender_id INT</text>
<text x="208" y="758" class="f">FK evaluator_id INT</text>
<text x="208" y="771" class="c">technical, price, timeline scores</text>
<text x="208" y="784" class="c">weighted_total, submitted_at</text>
<!-- bids -->
<rect x="530" y="680" width="220" height="140" class="t"/>
<rect x="530" y="680" width="220" height="22" fill="#0d2818" rx="5"/><text x="640" y="695" class="h" text-anchor="middle">bids</text>
<text x="538" y="719" class="p">PK id INT AUTO_INC</text>
<text x="538" y="732" class="f">FK tender_id INT</text>
<text x="538" y="745" class="f">FK supplier_id INT</text>
<text x="538" y="758" class="c">bid_amount DECIMAL(15,2)</text>
<text x="538" y="771" class="c">technical_compliance TEXT</text>
<text x="538" y="784" class="c">proposed_timeline_days INT</text>
<text x="538" y="797" class="c">document_path, submitted_at</text>
<!-- bid_technical_criteria -->
<rect x="530" y="880" width="220" height="70" class="t"/>
<rect x="530" y="880" width="220" height="22" fill="#0d2818" rx="5"/><text x="640" y="895" class="h" text-anchor="middle">bid_technical_criteria</text>
<text x="538" y="919" class="p">PK id INT AUTO_INC</text>
<text x="538" y="932" class="f">FK bid_id INT</text>
<text x="538" y="945" class="c">criterion_name, type, value</text>
<!-- LINES (H/V only) -->
<!-- users→user_tokens 1:N -->
<polyline points="400,90 125,90 125,240" class="r"/><text x="250" y="85" class="l">1:N</text>
<!-- users→suppliers 1:1 -->
<polyline points="470,178 470,210 385,210 385,240" class="r"/><text x="410" y="205" class="l">1:1</text>
<!-- users→officers 1:1 -->
<polyline points="540,178 540,210 635,210 635,240" class="r"/><text x="575" y="205" class="l">1:1</text>
<!-- users→evaluators 1:1 -->
<polyline points="630,90 895,90 895,240" class="r"/><text x="750" y="85" class="l">1:1</text>
<!-- users→tenders 1:N -->
<polyline points="515,178 515,400 460,400 460,430" class="r"/><text x="480" y="395" class="l">1:N</text>
<!-- tenders→tender_evaluators 1:N -->
<polyline points="580,470 895,470 895,430" class="r"/><text x="720" y="465" class="l">1:N</text>
<!-- evaluators→tender_evaluators M:N -->
<polyline points="895,338 895,380 895,380 895,430" class="d"/><text x="900" y="385" class="l">M:N</text>
<!-- tenders→bids 1:N -->
<polyline points="460,598 460,650 640,650 640,680" class="r"/><text x="530" y="645" class="l">1:N</text>
<!-- suppliers→bids 1:N -->
<polyline points="385,366 385,650 640,650 640,680" class="r"/><text x="490" y="645" class="l">1:N</text>
<!-- bids→evaluations 1:N -->
<polyline points="530,750 315,750 315,680" class="r"/><text x="400" y="745" class="l">1:N</text>
<!-- tenders→evaluations 1:N -->
<polyline points="380,598 380,650 315,650 315,680" class="d"/><text x="330" y="645" class="l">1:N</text>
<!-- evaluators→evaluations 1:N -->
<polyline points="790,305 700,305 700,650 315,650 315,680" class="d"/><text x="500" y="645" class="l">1:N</text>
<!-- tenders→awards 1:1 -->
<polyline points="340,520 130,520 130,680" class="r"/><text x="200" y="515" class="l">1:1</text>
<!-- bids→awards 1:1 -->
<polyline points="530,770 130,770 130,806" class="d"/><text x="300" y="765" class="l">1:1</text>
<!-- bids→bid_technical_criteria 1:N -->
<polyline points="640,820 640,880" class="r"/><text x="645" y="855" class="l">1:N</text>
<!-- Title -->
<text x="550" y="975" font-size="13" font-weight="700" fill="#1B4332" text-anchor="middle">ProcureGov — Entity Relationship Diagram (3NF Compliant)</text>
<text x="550" y="992" font-size="9" fill="#666" text-anchor="middle">PK = Primary Key · FK = Foreign Key · Solid = Identifying · Dashed = Non-Identifying</text>
</svg>
